name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: debug-x64-msvc-windows
            runner: windows-latest
          - preset: release-x64-msvc-windows
            runner: windows-latest
          - preset: debug-x64-gcc-linux
            runner: ubuntu-latest
          - preset: release-x64-gcc-linux
            runner: ubuntu-latest
          - preset: debug-arm64-clang-macos
            runner: macos-latest
          - preset: release-arm64-clang-macos
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxxf86vm-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            ninja-build

      - name: Install macOS system dependencies
        if: matrix.runner == 'macos-latest'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: matrix.runner == 'windows-latest'
        run: choco install ninja

      - name: Set up MSVC environment (Windows)
        if: matrix.runner == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: 544a4c5c297e60e4ac4a5a1810df66748d908869
          path: vcpkg

      - name: Bootstrap vcpkg (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: ./vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (Linux/macOS)
        if: matrix.runner != 'windows-latest'
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/packages
            ${{ github.workspace }}/vcpkg/buildtrees
          key: vcpkg-${{ matrix.preset }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ matrix.preset }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}
          key: cmake-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            cmake-${{ matrix.preset }}-

      - name: Configure
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --build build/${{ matrix.preset }}
